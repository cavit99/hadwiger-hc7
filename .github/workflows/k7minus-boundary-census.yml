name: Experimental K7-minus boundary census

on:
  pull_request:
    paths:
      - active/hc7_k7minus_boundary_census.py
      - .github/workflows/k7minus-boundary-census.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  census:
    strategy:
      fail-fast: false
      matrix:
        order: [7, 8]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/requirements-verifiers.txt
      - name: Install nauty and verifier dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y nauty
          if ! command -v geng >/dev/null && command -v nauty-geng >/dev/null; then
            sudo ln -s "$(command -v nauty-geng)" /usr/local/bin/geng
          fi
          python -m pip install -r tools/requirements-verifiers.txt
      - name: Run exact compact census
        run: |
          geng -q ${{ matrix.order }} \
            | python active/hc7_k7minus_boundary_census.py \
                --order ${{ matrix.order }} --survivor-limit 0 \
            | tee k7minus-boundary-${{ matrix.order }}.json
      - uses: actions/upload-artifact@v6
        with:
          name: k7minus-boundary-${{ matrix.order }}
          path: k7minus-boundary-${{ matrix.order }}.json

  summarize:
    needs: census
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.counts.outputs.summary }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: k7minus-boundary-*
          path: census-output
          merge-multiple: true
      - id: counts
        name: Parse exact counts
        shell: python
        run: |
          import json
          import os
          from pathlib import Path

          fields = []
          for order in (7, 8):
              path = Path("census-output") / f"k7minus-boundary-{order}.json"
              result = json.loads(path.read_text())
              counts = result["counts"]
              fields.append(
                  f"n{order}:g={counts['graphs']},"
                  f"b={counts['static_boundaries']},"
                  f"p={counts['disjoint_nonedge_pairs']},"
                  f"yes={counts['k6minus_positive']},"
                  f"no={counts['k6minus_survivors']}"
              )
          summary = ";".join(fields)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"summary={summary}", file=output)
          print(summary)

  expose:
    needs: summarize
    name: ${{ needs.summarize.outputs.summary }}
    runs-on: ubuntu-latest
    steps:
      - run: echo '${{ needs.summarize.outputs.summary }}'
