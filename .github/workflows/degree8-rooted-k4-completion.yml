name: Degree-eight rooted-K4 completion census

on:
  pull_request:
    paths:
      - active/hc7_almost_dominating_rooted_k5_census.py
      - active/hc7_degree8_alpha3_virtual_edge_census.py
      - active/hc7_degree8_rooted_k4_completion_census.py
      - .github/workflows/degree8-rooted-k4-completion.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  census:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install nauty and NetworkX
        run: |
          sudo apt-get update
          sudo apt-get install -y nauty
          if ! command -v geng >/dev/null && command -v nauty-geng >/dev/null; then
            sudo ln -s "$(command -v nauty-geng)" /usr/local/bin/geng
          fi
          python -m pip install -r tools/requirements-verifiers.txt
      - name: Run exact census
        run: |
          geng -q 8 | python active/hc7_degree8_rooted_k4_completion_census.py | tee degree8-rooted-k4.json
      - uses: actions/upload-artifact@v6
        with:
          name: degree8-rooted-k4
          path: degree8-rooted-k4.json

  summarize:
    needs: census
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.counts.outputs.summary }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: degree8-rooted-k4
          path: output
      - id: counts
        shell: python
        run: |
          import json,os
          from pathlib import Path
          r=json.loads((Path('output')/'degree8-rooted-k4.json').read_text()); c=r['counts']
          summary=(f"inputs={c.get('rooted_k5_survivors',0)},"
                   f"yes={c.get('rooted_k4_positive',0)},"
                   f"no={c.get('survivors',0)},"
                   f"states={c.get('tested_rooted_k4_states',0)}")
          with open(os.environ['GITHUB_OUTPUT'],'a') as out: print(f'summary={summary}',file=out)
          print(summary); print('counts',c)
          for s in r['survivors'][:100]: print('survivor',s)

  expose:
    needs: summarize
    name: ${{ needs.summarize.outputs.summary }}
    runs-on: ubuntu-latest
    steps:
      - run: echo '${{ needs.summarize.outputs.summary }}'
