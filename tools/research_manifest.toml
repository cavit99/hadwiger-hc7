  "two safe paired-trace supports reflect, while a nonempty boundary-edge obstruction forces at least three simultaneous far-shore Kempe connections",
  "those three Kempe connections either pack disjointly away from their prescribed terminals or expose an actual order-seven boundary carrying a concrete one-sided equality partition",
  "cutvertices and two-vertex separators inside a boundary-full component give an exact-seven boundary or an explicit repair support disjoint from a boundary-full residual, apart from a classified contact-concentration list",
