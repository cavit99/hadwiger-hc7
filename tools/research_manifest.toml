[[claims]]
id = "hc7.target.adjacent_pair_model_or_separator"
title = "Adjacent-pair model synchronization or colour-compatible separation"
kind = "target"
status = "active-target"
source = "active/hc7_adjacent_pair_palette_model_frontier.md"
source_heading = "3. Primary open theorem"
active = true
scope = "unbounded host graph"
label_fidelity = "literal host vertices and named branch sets"
separator_order = "exact seven required"
colour_compatibility = "open"
hypotheses = [
  "hypothetical minor-minimal seven-chromatic graph with no K7 minor",
  "selected adjacent pair and the audited separator-or-five-core dichotomy",
]
allowed_exits = [
  "explicit K7-minor model",
  "exact order-seven separation with one boundary equality partition realised on both closed shores",
]
does_not_prove = [
  "HC7",
  "an upper bound on every separator returned by a disconnected two-colour graph",
  "compatible shore colourings from a raw exact order-seven separation",
]
keywords = ["adjacent pair", "component defect", "colour-compatible separation", "rooted K4"]

[[claims]]
id = "hc7.target.defect_one_exchange"
title = "Defect-one two-tree exchange or colour-gluing theorem"
kind = "target"
status = "active-target"
source = "active/hc7_two_colorful_sets_rooted_k4_frontier.md"
source_heading = "4. The deficient component and its expanded boundary"
active = true
scope = "conditional unique-deficiency branch in the host graph"
label_fidelity = "literal lifted residual components and named path-side anchors"
separator_order = "at least seven; exact seven is an allowed exit"
colour_compatibility = "open"
strict_parameter = "minimum |V(L)| over all eligible simplicial lifted components in every valid defect-one configuration in the fixed host G"
hypotheses = [
  "a valid defect-one configuration in the original fixed G: the complete adjacent-pair connected-dominating frame, uniquely deficient rooted model, repair path P, admissible cut q, four labelled eligible component selections and the resulting contact graph J",
  "unique deficient branch set",
  "fixed admissible repair-path cut",
  "four represented eligible component classes",
  "every selected component is adjacent to both path-side anchor sets and to z",
  "K4-minor-free component-contact graph of defect one, hence a two-tree",
  "L chosen globally with minimum order among eligible simplicial lifted components in the fixed host",
]
allowed_exits = [
  "explicit K7-minor model",
  "exact order-seven separation whose closed-shore six-colourings induce the same equality partition of the seven literal boundary vertices after a colour permutation",
  "new full valid defect-one configuration in the original fixed G with an eligible lifted simplicial component L' satisfying |V(L')|<|V(L)|",
]
does_not_prove = [
  "exhaustiveness of unique deficiency",
  "existence of an eligible four-part component selection in every residue",
  "defect one in every connected-dominating residue",
  "a split of a lifted simplicial component",
  "the exchange that produces a smaller eligible lifted simplicial component",
]
preserves = [
  "label map from contact-graph vertices to protected branch-set classes",
  "oriented repair path and valid-cut interval endpoints",
  "literal host edges and endpoints witnessing every contact-graph edge and every contact with z and both path-side anchor sets, retained under lifting or explicitly replaced",
  "bipartition-side or pole source of each colouring response",
  "named root traces under lifting to G",
  "exact boundary equality partition from proper-minor colourings",
  "the full boundary N_G(Y) of a named connected residual piece Y with both shores nonempty when a transition fails",
]
keywords = ["component defect", "two-tree", "simplicial component", "common-hole law"]

